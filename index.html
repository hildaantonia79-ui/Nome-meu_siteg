<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mega Cavaleiro X P.E.K.K.A</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #2b6cb0, #1e3c72);
      color: white;
    }

    .top-bar {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 15px;
      display: flex;
      justify-content: center;
      gap: 30px;
      background: rgba(0,0,0,0.6);
    }

    .container {
      display: flex;
      justify-content: space-around;
      margin-top: 90px;
    }

    .grafico {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    .grafico img {
      width: 280px;
    }

    .tabela {
      text-align: center;
      margin-top: 20px;
    }

    .tabela img {
      width: 80%;
      max-width: 600px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #2b6cb0;
      color: white;
      cursor: pointer;
    }

    .bottom-bar {
      position: fixed;
      bottom: 0;
      width: 100%;
      padding: 15px;
      display: flex;
      justify-content: center;
      gap: 40px;
      background: rgba(0,0,0,0.7);
    }

    .nos-container {
      position: relative;
    }

    .nos-texto {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      background: black;
      padding: 5px;
      display: none;
    }

    .overlay {
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    input {
      padding: 5px;
    }
  </style>
</head>
<body>

<div class="top-bar">
  <span>Tabela</span>
  <span>Pizza</span>
  <span>Barras</span>
</div>

<div class="container">
  <div class="grafico">
    <h2>Pizza</h2>
    <img src="https://loyal-sapphire-hpke3bfl0l.edgeone.app/pizza.png">
  </div>

  <div class="grafico">
    <h2>Barras</h2>
    <img src="https://mild-magenta-awv90mntvu.edgeone.app/grafico.png">
  </div>
</div>

<div class="tabela">
  <img src="https://outdoor-beige-bv4bfzfcpq.edgeone.app/tabela.png">
</div>

<!-- CALCULADORA -->
<div class="overlay" id="overlay">
  <div class="card">
    <h2>Calculadora</h2>
    <input id="operacao" placeholder="media, moda ou mediana">
    <br><br>
    <button onclick="calcular()">Calcular</button>
    <button onclick="fechar()">Fechar</button>
    <p id="resultado"></p>
  </div>
</div>

<!-- BARRA -->
<div class="bottom-bar">
  <button onclick="abrir()">Calculadora</button>

  <div class="nos-container">
    <div class="nos-texto" id="nosTexto">
      João Guilherme, Guilherme Batista, Nathan
    </div>
    <button onclick="mostrarNos()">Nós</button>
  </div>
</div>

<script>
function abrir() {
  document.getElementById("overlay").style.display = "flex";
}

function fechar() {
  document.getElementById("overlay").style.display = "none";
}

function calcular() {
  const op = document.getElementById("operacao").value.toLowerCase().trim();

  let res = "";

  if (op === "media") {
    res = (253 + 247) / 2;
    res = "Média = " + res;
  } else if (op === "moda") {
    res = "Moda = 253, 247";
  } else if (op === "mediana") {
    res = (253 + 247) / 2;
    res = "Mediana = " + res;
  } else {
    res = "Digite certo";
  }

  document.getElementById("resultado").innerText = res;
}

function mostrarNos() {
  const t = document.getElementById("nosTexto");
  t.style.display = t.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
