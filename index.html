<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mega Cavaleiro X P.E.K.K.A</title>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #2b6cb0, #805ad5);
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

/* PERSONAGENS (FUNDO) */
.pekka {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 180px;
  opacity: 0.08;
  pointer-events: none;
}

.mega {
  position: fixed;
  bottom: 0;
  right: 0;
  width: 180px;
  opacity: 0.08;
  pointer-events: none;
}

/* TOPO */
.top-bar {
  position: fixed;
  top: 0;
  width: 100%;
  background: #111d2b;
  padding: 15px;
  display: flex;
  justify-content: center;
  gap: 30px;
  z-index: 1000;
}
.top-bar a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

/* CONTEÚDO */
.container {
  display: flex;
  justify-content: space-around;
  margin-top: 80px;
}
.grafico {
  background: white;
  padding: 20px;
  border-radius: 10px;
}
.grafico img {
  width: 300px;
}

/* TABELA */
.tabela {
  text-align: center;
  margin-top: 40px;
}
.tabela img {
  width: 600px;
}

/* CALCULADORA */
.calculadora-box {
  position: fixed;
  bottom: -500px;
  left: 50%;
  transform: translateX(-50%);
  width: 320px;
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.5);
  text-align: center;
  transition: 0.5s;
}

.calculadora-box.ativa {
  bottom: 80px;
}

input {
  width: 90%;
  padding: 8px;
  margin: 5px;
}

button {
  padding: 8px 10px;
  margin: 5px;
  border: none;
  background: #2b6cb0;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

.fechar {
  background: red;
}

/* BARRA INFERIOR */
.bottom-bar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111d2b;
  padding: 20px;
  display: flex;
  justify-content: center;
  gap: 50px;
}
.bottom-bar a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

/* NÓS ANIMADO */
.nos {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) scale(0.8);
  background: #111d2b;
  padding: 10px 20px;
  border-radius: 10px;
  color: white;
  font-size: 14px;
  opacity: 0;
  transition: 0.3s;
  pointer-events: none;
}

.nos.ativo {
  opacity: 1;
  transform: translateX(-50%) scale(1);
  pointer-events: auto;
}
</style>
</head>

<body>

<!-- PERSONAGENS -->
<img src="https://static.wikia.nocookie.net/clashroyale/images/4/49/PEKKA.png" class="pekka">
<img src="https://static.wikia.nocookie.net/clashroyale/images/7/7c/Mega_Knight.png" class="mega">

<!-- TOPO -->
<div class="top-bar">
  <a href="#">Tabela</a>
  <a href="#">Pizza</a>
  <a href="#">Barras</a>
</div>

<!-- CONTEÚDO -->
<div class="container">
  <div class="grafico">
    <h2>Pizza</h2>
    <img src="https://loyal-sapphire-hpke3bfl0l.edgeone.app/pizza.png">
  </div>

  <div class="grafico">
    <h2>Barras</h2>
    <img src="https://elaborate-rose-bnlamm0kt8.edgeone.app/tabela.png">
  </div>
</div>

<div class="tabela">
  <img src="https://outdoor-beige-bv4bfzfcpq.edgeone.app/tabela.png">
</div>

<!-- CALCULADORA -->
<div class="calculadora-box" id="calcBox">
  <h2>Calculadora 2000</h2>
  
  <input id="numeros" placeholder="Ex: 10, 20, 30">

  <br>

  <button onclick="media()">Média</button>
  <button onclick="moda()">Moda</button>
  <button onclick="mediana()">Mediana</button>
  <button onclick="soma()">Soma</button>
  <button onclick="maximo()">Máx</button>
  <button onclick="minimo()">Mín</button>
  <button onclick="limpar()">Limpar</button>

  <p id="res"></p>

  <button class="fechar" onclick="fecharCalc()">Fechar</button>
</div>

<!-- BARRA -->
<div class="bottom-bar">
  <a href="#" onclick="abrirCalc()">Calculadora 2000</a>
  <a href="#" onclick="mostrarNos()">Nós</a>
</div>

<!-- NÓS -->
<div class="nos" id="nos">
  João Guilherme • Guilherme Batista • Nathan
</div>

<script>
function abrirCalc() {
  document.getElementById("calcBox").classList.add("ativa");
}

function fecharCalc() {
  document.getElementById("calcBox").classList.remove("ativa");
}

window.addEventListener("scroll", () => {
  document.getElementById("calcBox").classList.add("ativa");
});

function pegarNumeros() {
  return document.getElementById("numeros").value
    .split(",")
    .map(n => Number(n.trim()))
    .filter(n => !isNaN(n));
}

function res(txt) {
  document.getElementById("res").innerText = txt;
}

function erro() {
  res("Digite números válidos!");
}

function media() {
  let n = pegarNumeros();
  if (!n.length) return erro();
  res("Média: " + (n.reduce((a,b)=>a+b,0)/n.length));
}

function moda() {
  let n = pegarNumeros();
  if (!n.length) return erro();
  let f = {};
  n.forEach(x => f[x]=(f[x]||0)+1);
  let max = Math.max(...Object.values(f));
  res("Moda: " + Object.keys(f).filter(x=>f[x]==max).join(","));
}

function mediana() {
  let n = pegarNumeros().sort((a,b)=>a-b);
  if (!n.length) return erro();
  let m = Math.floor(n.length/2);
  res("Mediana: " + (n.length%2 ? n[m] : (n[m-1]+n[m])/2));
}

function soma() {
  let n = pegarNumeros();
  if (!n.length) return erro();
  res("Soma: " + n.reduce((a,b)=>a+b,0));
}

function maximo() {
  let n = pegarNumeros();
  if (!n.length) return erro();
  res("Máximo: " + Math.max(...n));
}

function minimo() {
  let n = pegarNumeros();
  if (!n.length) return erro();
  res("Mínimo: " + Math.min(...n));
}

function limpar() {
  document.getElementById("numeros").value = "";
  res("");
}

function mostrarNos() {
  document.getElementById("nos").classList.toggle("ativo");
}
</script>

</body>
</html>
