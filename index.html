<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mega Cavaleiro X P.E.K.K.A</title>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #2b6cb0, #805ad5);
  font-family: Arial, sans-serif;
}

/* TOPO */
.top-bar {
  position: fixed;
  top: 0;
  width: 100%;
  background: #111d2b;
  padding: 15px;
  display: flex;
  justify-content: center;
  gap: 30px;
  z-index: 1000;
}
.top-bar a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

/* CONTEÚDO */
.container {
  display: flex;
  justify-content: space-around;
  margin-top: 80px;
}
.grafico {
  background: white;
  padding: 20px;
  border-radius: 10px;
}
.grafico img {
  width: 300px;
}

/* TABELA */
.tabela {
  text-align: center;
  margin-top: 40px;
}
.tabela img {
  width: 600px;
}

/* CALCULADORA (OCULTA) */
.calculadora-box {
  position: fixed;
  bottom: -500px;
  left: 50%;
  transform: translateX(-50%);
  width: 320px;
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.5);
  text-align: center;
  transition: 0.5s;
}

.calculadora-box.ativa {
  bottom: 80px;
}

input {
  width: 90%;
  padding: 8px;
  margin: 5px;
}

button {
  padding: 8px 10px;
  margin: 5px;
  border: none;
  background: #2b6cb0;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

.fechar {
  background: red;
}

/* BARRA INFERIOR */
.bottom-bar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111d2b;
  padding: 20px;
  display: flex;
  justify-content: center;
  gap: 50px;
}
.bottom-bar a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

/* NOS */
.nos {
  display: none;
  text-align: center;
  color: white;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="top-bar">
  <a href="#">Tabela</a>
  <a href="#">Pizza</a>
  <a href="#">Barras</a>
</div>

<div class="container">
  <div class="grafico">
    <h2>Pizza</h2>
    <img src="https://loyal-sapphire-hpke3bfl0l.edgeone.app/pizza.png">
  </div>

  <div class="grafico">
    <h2>Barras</h2>
    <img src="https://elaborate-rose-bnlamm0kt8.edgeone.app/tabela.png">
  </div>
</div>

<div class="tabela">
  <img src="https://outdoor-beige-bv4bfzfcpq.edgeone.app/tabela.png">
</div>

<!-- CALCULADORA NOVA -->
<div class="calculadora-box" id="calcBox">
  <h2>Calculadora 2000</h2>
  
  <input id="numeros" placeholder="Ex: 10, 20, 30">

  <br>

  <button onclick="media()">Média</button>
  <button onclick="moda()">Moda</button>
  <button onclick="mediana()">Mediana</button>

  <p id="res"></p>

  <button class="fechar" onclick="fecharCalc()">Fechar</button>
</div>

<div class="bottom-bar">
  <a href="#" onclick="abrirCalc()">Calculadora 2000</a>
  <a href="#" onclick="mostrarNos()">Nós</a>
</div>

<div class="nos" id="nos">
  João Guilherme • Guilherme Batista • Nathan
</div>

<script>
function abrirCalc() {
  document.getElementById("calcBox").classList.add("ativa");
}

function fecharCalc() {
  document.getElementById("calcBox").classList.remove("ativa");
}

/* ABRE AO ROLAR */
window.addEventListener("scroll", () => {
  document.getElementById("calcBox").classList.add("ativa");
});

/* PEGAR NÚMEROS */
function pegarNumeros() {
  return document.getElementById("numeros").value
    .split(",")
    .map(n => Number(n.trim()))
    .filter(n => !isNaN(n));
}

function media() {
  let n = pegarNumeros();
  let m = n.reduce((a,b)=>a+b,0)/n.length;
  document.getElementById("res").innerText = "Média: " + m;
}

function moda() {
  let n = pegarNumeros();
  let freq = {};
  n.forEach(x => freq[x] = (freq[x]||0)+1);
  let max = Math.max(...Object.values(freq));
  let moda = Object.keys(freq).filter(x => freq[x]==max);
  document.getElementById("res").innerText = "Moda: " + moda.join(",");
}

function mediana() {
  let n = pegarNumeros().sort((a,b)=>a-b);
  let m = Math.floor(n.length/2);
  let med = n.length%2 ? n[m] : (n[m-1]+n[m])/2;
  document.getElementById("res").innerText = "Mediana: " + med;
}

function mostrarNos() {
  document.getElementById("nos").style.display = "block";
}
</script>

</body>
</html>
