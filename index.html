<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mega Cavaleiro X P.E.K.K.A</title>

  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #2b6cb0, #805ad5);
      font-family: Arial, sans-serif;
      min-height: 100vh;
    }

    .top-bar {
      position: fixed;
      top: 0;
      width: 100%;
      background: #111d2b;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: center;
      gap: 30px;
      z-index: 1000;
    }

    .top-bar a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .container {
      display: flex;
      justify-content: space-around;
      margin-top: 80px;
      padding: 20px;
    }

    .grafico {
      background: white;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .grafico img {
      width: 300px;
      border-radius: 8px;
    }

    .tabela {
      display: flex;
      justify-content: center;
      margin-top: 40px;
    }

    .tabela img {
      width: 600px;
      border-radius: 10px;
    }

    /* FUNDO ESCURO (overlay) */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    /* POPUP */
    .card {
      background: white;
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      width: 320px;
      animation: aparecer 0.3s ease;
    }

    @keyframes aparecer {
      from { transform: scale(0.7); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    input {
      padding: 8px;
      width: 80%;
    }

    button {
      padding: 10px 15px;
      background: #2b6cb0;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin: 5px;
    }

    .bottom-bar {
      position: fixed;
      bottom: 0;
      width: 100%;
      padding: 20px;
      display: flex;
      justify-content: center;
      gap: 40px;
      background: #2b6cb0;
    }

    .nos {
      text-align: center;
      color: white;
      display: none;
      margin-bottom: 80px;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <a href="#">Tabela</a>
    <a href="#">Gráfico Pizza</a>
    <a href="#">Gráfico Barras</a>
  </div>

  <div class="container">
    <div class="grafico">
      <h2>Gráfico Pizza</h2>
      <img src="https://loyal-sapphire-hpke3bfl0l.edgeone.app/pizza.png">
    </div>

    <div class="grafico">
      <h2>Gráfico Barras</h2>
      <img src="https://elaborate-rose-bnlamm0kt8.edgeone.app/tabela.png">
    </div>
  </div>

  <div class="tabela">
    <img src="https://outdoor-beige-bv4bfzfcpq.edgeone.app/tabela.png">
  </div>

  <!-- POPUP -->
  <div class="overlay" id="overlay">
    <div class="card">
      <h2>Calculadora 2000</h2>
      <p>Digite: media, moda ou mediana</p>
      <input type="text" id="operacao"><br><br>
      <button id="calcularBtn">Calcular</button>
      <button id="fecharBtn">Fechar</button>
      <p id="resultado"></p>
    </div>
  </div>

  <div class="bottom-bar">
    <button id="abrirCalc">Calculadora 2000</button>
    <button id="btnNos">Nós</button>
  </div>

  <div class="nos" id="nos">
    Site confeccionado por: João Guilherme, Guilherme Batista, Nathan
  </div>

  <script>
    const overlay = document.getElementById("overlay");
    const abrirBtn = document.getElementById("abrirCalc");
    const fecharBtn = document.getElementById("fecharBtn");
    const calcularBtn = document.getElementById("calcularBtn");

    abrirBtn.addEventListener("click", () => {
      overlay.style.display = "flex";
    });

    fecharBtn.addEventListener("click", () => {
      overlay.style.display = "none";
    });

    calcularBtn.addEventListener("click", () => {
      const numeros = [253, 247];
      const op = document.getElementById("operacao").value.toLowerCase().trim();

      let resultado = "";

      if (op === "media") {
        resultado = (253 + 247) / 2;
        resultado = "Média = " + resultado;
      } else if (op === "moda") {
        resultado = "Moda = 253, 247";
      } else if (op === "mediana") {
        resultado = (253 + 247) / 2;
        resultado = "Mediana = " + resultado;
      } else {
        resultado = "Digite media, moda ou mediana";
      }

      document.getElementById("resultado").innerText = resultado;
    });

    document.getElementById("btnNos").addEventListener("click", () => {
      document.getElementById("nos").style.display = "block";
    });
  </script>

</body>
</html>
