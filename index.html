.tabela img {

<!-- TOPO -->
<div class="top-bar">
  <a href="https://outdoor-beige-bv4bfzfcpq.edgeone.app/tabela.png" target="_blank">Tabela</a>
  <a href="https://loyal-sapphire-hpke3bfl0l.edgeone.app/pizza.png" target="_blank">Pizza</a>

<!-- CONTEÚDO -->
<div class="container">
  <div class="grafico">
    <h2>Pizza</h2>
    <img src="https://loyal-sapphire-hpke3bfl0l.edgeone.app/pizza.png" onclick="abrirOverlay(this.src)">
  </div>

  <div class="grafico">
    <h2>Barras</h2>
    <img src="https://mild-magenta-awv90mntvu.edgeone.app/grafico.png" onclick="abrirOverlay(this.src)">
  </div>
</div>

<div class="tabela">
  <img src="https://outdoor-beige-bv4bfzfcpq.edgeone.app/tabela.png" onclick="abrirOverlay(this.src)">
</div>

<!-- CALCULADORA -->
<div class="calculadora-box" id="calcBox">
  <h2>Calculadora 2000</h2>
  <input id="numeros" placeholder="Ex: 10, 20, 30">

  <br>

  <button onclick="media()">Média</button>
  <button onclick="moda()">Moda</button>
  <button onclick="mediana()">Mediana</button>
  <button onclick="limpar()">Limpar</button>

  <p id="res"></p>

  <button class="fechar" onclick="fecharCalc()">Fechar</button>
</div>

<!-- BARRA -->
<div class="bottom-bar">
  <a href="#" onclick="abrirCalc()">Calculadora 2000</a>
  <a href="#" onclick="mostrarNos()">Nós</a>
  <a href="https://hard-aquamarine-bicztuf3qw.edgeone.app/e%20esse%20luck.jpeg" target="_blank">
    <img src="https://hard-aquamarine-bicztuf3qw.edgeone.app/e%20esse%20luck.jpeg">
    Outros
  </a>
</div>

<!-- NÓS -->
<div class="nos" id="nos">
  Criado por: João Guilherme • Nathan • Guilherme Batista
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <span class="fechar-overlay" onclick="fecharOverlay()">✖</span>
  <img id="overlayImg" src="">
</div>

<script>
function abrirCalc() {
  document.getElementById("calcBox").classList.add("ativa");
}

function fecharCalc() {
  document.getElementById("calcBox").classList.remove("ativa");
}

function pegarNumeros() {
  return document.getElementById("numeros").value
    .split(",")
    .map(n => Number(n.trim()))
    .filter(n => !isNaN(n));
}

function media() {
  let n = pegarNumeros();
  if (!n.length) return;
  document.getElementById("res").innerText =
    "Média: " + (n.reduce((a,b)=>a+b,0)/n.length);
}

function moda() {
  let n = pegarNumeros();
  if (!n.length) return;
  let f = {};
  n.forEach(x => f[x]=(f[x]||0)+1);
  let max = Math.max(...Object.values(f));
  document.getElementById("res").innerText =
    "Moda: " + Object.keys(f).filter(x=>f[x]==max).join(",");
}

function mediana() {
  let n = pegarNumeros().sort((a,b)=>a-b);
  if (!n.length) return;
  let m = Math.floor(n.length/2);
  document.getElementById("res").innerText =
    "Mediana: " + (n.length%2 ? n[m] : (n[m-1]+n[m])/2);
}

function limpar() {
  document.getElementById("numeros").value = "";
  document.getElementById("res").innerText = "";
}

function mostrarNos() {
  let n = document.getElementById("nos");
  n.classList.add("ativo");

  setTimeout(() => {
    n.classList.remove("ativo");
  }, 3000);
}

/* OVERLAY */
function abrirOverlay(src) {
  let overlay = document.getElementById("overlay");
  let img = document.getElementById("overlayImg");

  img.src = src;
  overlay.style.display = "flex";

  setTimeout(() => {
    overlay.classList.add("ativo");
  }, 10);
}

function fecharOverlay() {
  let overlay = document.getElementById("overlay");

  overlay.classList.remove("ativo");

  setTimeout(() => {
    overlay.style.display = "none";
  }, 300);
}

/* FECHAR CLICANDO FORA */
document.getElementById("overlay").addEventListener("click", function(e) {
  if (e.target.id === "overlay") {
    fecharOverlay();
  }
});
</script>

</body>
